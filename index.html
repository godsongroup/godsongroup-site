<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODSON GROUP - Luxury Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--black); color: white; margin: 0; padding: 20px; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; font-family: 'Playfair Display', serif; }
        h2 { color: var(--gold); text-align: center; margin-top: 40px; margin-bottom: 20px; }

        /* ფოტოების გალერეა */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; max-width: 900px; margin: 0 auto 50px; }
        .gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid var(--gold); }

        /* ვიდეოების სექცია */
        .video-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 50px; }
        .video-box { width: 300px; border: 2px solid var(--gold); border-radius: 10px; overflow: hidden; background: #111; }
        video { width: 100%; display: block; }

        /* კონტაქტების სექცია */
        .contact-section { text-align: center; margin-top: 50px; border-top: 1px solid #333; padding-top: 30px; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; max-width: 700px; margin: 20px auto; }
        .btn { padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; background: #333; transition: 0.3s; }
        .btn:hover { background: #444; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-gold:hover { background: #b8962f; }
    </style>
</head>
