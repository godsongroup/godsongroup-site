<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
background:url('bg.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.85);
min-height:100vh;
padding-bottom:50px;
}

header{
padding:60px 20px 30px;
animation:fade 1.5s ease;
}

header h1{
font-size:45px;
color:#d4af37;
text-shadow:0 0 20px rgba(212, 175, 55, 0.6);
margin-bottom:15px;
letter-spacing: 2px;
}

header p{
font-size:20px;
color:#ddd;
font-weight: 300;
}

.section-title{
font-size:32px;
color:#d4af37;
margin:50px 0 25px;
text-shadow:0 0 10px rgba(212, 175, 55, 0.4);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px, 1fr));
gap:12px;
padding:0 20px;
max-width: 1000px;
margin: 0 auto;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:18px;
border:2px solid rgba(212, 175, 55, 0.5);
transition:0.4s ease;
cursor: pointer;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 20px #d4af37;
border-color: #d4af37;
}

.video-box{
padding:20px;
max-width: 700px;
margin: 0 auto;
}

.video-box video{
width:100%;
border-radius:18px;
border:2px solid #d4af37;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.socials{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
max-width: 480px;
margin: 0 auto;
}

.socials a{
text-decoration:none;
padding:16px;
border-radius:14px;
font-size:20px;
font-weight:bold;
color:white;
transition:0.3s ease;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.socials a:hover{
transform:translateY(-3px);
box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

.call{ background:#8b6b2e; }
.whatsapp{ background:#25D366; }
.viber{ background:#7360f2; }
.telegram{ background:#229ED9; }
.instagram{ background:#E1306C; }
.facebook{ background:#1877F2; }
.tiktok{ background:#000000; border: 1px solid #333;}

.floating{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
text-decoration:none;
box-shadow:0 0 15px rgba(37, 211, 102, 0.6);
animation:pulse 2s infinite;
z-index: 999;
}

@keyframes pulse{
0%{
    transform:scale(1);
    box-shadow:0 0 15px rgba(37, 211, 102, 0.6);
}
50%{
    transform:scale(1.08);
    box-shadow:0 0 30px rgba(37, 211, 102, 0.9);
}
100%{
    transform:scale(1);
    box-shadow:0 0 15px rgba(37, 211, 102, 0.6);
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

footer{
margin-top:60px;
padding:30px 20px;
font-size:15px;
color:#888;
border-top: 1px solid rgba(255,255,255,0.05);
}

@media (max-width: 480px) {
    header h1 { font-size: 36px; }
    header p { font-size: 16px; }
    .section-title { font-size: 26px; }
    .gallery { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); padding: 0 15px; }
    .gallery img { height: 160px; }
}
</style>
</head>
