<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODSON GROUP - Luxury Renovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--black); color: white; margin: 0; padding: 0; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 45px; margin-top: 50px; }
        .section-title { color: var(--gold); margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 2px; }

        /* გალერეის სტილი */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 1px solid var(--gold); }

        /* ვიდეოების სტილი */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-box video { width: 100%; border-radius: 15px; border: 2px solid var(--gold); }

        /* ღილაკები */
        .socials { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        .btn { padding: 15px; border-radius: 10px; color: white; text-decoration: none; font-weight: bold; background: #222; transition: 0.3s; }
        .btn:hover { background: #333; }
        .btn-gold { background: var(--gold); color: black; }

        /* მცურავი ფანჯარა */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal img { max-width: 90%; max-height: 80%; border: 3px solid var(--gold); border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>GODSON GROUP</h1>
    <p>სრული რემონტი • დიზაინი • მშენებლობა</p>

    <h2 class="section-title">📸 ჩვენი ნამუშევრები</h2>
    <div class="gallery">
        <img src="photo1.jpg" onclick="openModal(this.src)">
        <img src="photo2.jpg" onclick="openModal(this.src)">
        <img src="photo3.jpg" onclick="openModal(this.src)">
        <img src="photo4.jpg" onclick="openModal(this.src)">
        <img src="photo5.jpg" onclick="openModal(this.src)">
        <img src="photo6.jpg" onclick="openModal(this.src)">
        <img src="photo7.jpg" onclick="openModal(this.src)">
        <img src="photo8.jpg" onclick="openModal(this.src)">
    </div>

    <h2 class="section-title">🎬 ვიდეო მიმოხილვები</h2>
    <div class="video-grid">
        <div class="video-box"><video controls><source src="video11.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video12.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video13.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video14.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video15.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video16.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video17.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video18.mp4" type="video/mp4"></video></div>
        <div class="video-box"><video controls><source src="video19.mp4" type="video/mp4"></video></div>
    </div>

    <h2 class="section-title">📞 დაგვიკავშირდით</h2>
    <div class="socials">
        <a href="tel:+995599759795" class="btn btn-gold">📞 დარეკვა</a>
        <a href="https://wa.me/995599759795" class="btn">💬 WhatsApp</a>
    </div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
    <img id="modal-img">
</div>

<script>
    function openModal(src) { document.getElementById('modal').style.display = 'flex'; document.getElementById('modal-img').src = src; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
