<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODSON GROUP - Luxury Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--black); color: white; margin: 0; padding: 20px; text-align: center; }
        h1 { color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 30px; }
        h2 { color: var(--gold); margin-top: 40px; margin-bottom: 20px; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; max-width: 900px; margin: 0 auto 50px; }
        .gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid var(--gold); }
        
        .video-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 30px 0; }
        .video-wrapper { border: 2px solid var(--gold); border-radius: 10px; overflow: hidden; background: #111; }
        
        .contact-section { margin-top: 50px; border-top: 1px solid #333; padding-top: 30px; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; max-width: 700px; margin: 20px auto; }
        .btn { padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; color: white; background: #333; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <h1>GODSON GROUP</h1>

    <h2>📸 ჩვენი ნამუშევრები</h2>
    <div class="gallery">

        <img src="photo3.jpg" alt="Work">
        <img src="photo4.jpg" alt="Work">

        <img src="photo6.jpg" alt="Work">
        <img src="photo7.jpg" alt="Work">
        <img src="photo8.jpg" alt="Work">
        <img src="photo9.jpg" alt="Work">
        <img src="photo10.jpg" alt="Work">
    </div>

    <h2>🎬 ვიდეო მიმოხილვა</h2>
    <div class="video-container">
        <div class="video-wrapper">
            <iframe width="315" height="560" src="https://www.youtube.com/embed/ZQeSfu4jaw8" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="contact-section">
        <h2>დაგვიკავშირდით</h2>
        <div class="btn-grid">
            <a href="tel:+995599759795" class="btn btn-gold"><i class="fas fa-phone"></i> დარეკვა</a>
            <a href="https://wa.me/995599759795" class="btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>

            <a href="https://www.facebook.com/DEDE094" class="btn"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://www.instagram.com/godsongroup" class="btn"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://www.tiktok.com/@rmremont" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
        </div>
    </div>

</body>
</html>
