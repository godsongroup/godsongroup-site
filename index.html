<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url('bg.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.83);
min-height:100vh;
padding-bottom:50px;
}

header{
padding:50px 20px;
animation:fade 2s ease;
}

header h1{
font-size:58px;
color:#d4af37;
text-shadow:0 0 20px gold;
margin-bottom:15px;
}

header p{
font-size:23px;
color:#ddd;
line-height:1.6;
}

.section-title{
font-size:42px;
margin-top:40px;
margin-bottom:25px;
color:#d4af37;
text-shadow:0 0 10px gold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
height:240px;
object-fit:cover;
border-radius:25px;
border:3px solid #d4af37;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

.video-box{
padding:20px;
}

.video-box video{
width:95%;
border-radius:25px;
border:3px solid #d4af37;
margin-bottom:25px;
background:black;
}

.youtube-frame{
padding:20px;
}

.youtube-frame iframe{
width:95%;
height:260px;
border-radius:25px;
border:3px solid #ff0000;
}

.socials{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.socials a{
text-decoration:none;
padding:18px;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:white;
transition:0.3s;
display:block;
}

.socials a:hover{
transform:scale(1.05);
}

.call{
background:#9c7440;
}

.whatsapp{
background:#25D366;
}

.viber{
background:#7360F2;
}

.telegram{
background:#229ED9;
}

.instagram{
background:#E1306C;
}

.facebook{
background:#1877F2;
}

.youtube{
background:#ff0000;
}

.tiktok{
background:black;
border:2px solid white;
}

.float{
position:fixed;
right:20px;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
text-decoration:none;
z-index:999;
box-shadow:0 0 20px rgba(0,0,0,0.5);
animation:pulse 2s infinite;
}

.float-whatsapp{
bottom:100px;
background:#25D366;
color:white;
}

.float-phone{
bottom:20px;
background:#d4af37;
color:black;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(-40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

footer{
margin-top:40px;
padding:20px;
font-size:18px;
color:#bbb;
}

</style>
