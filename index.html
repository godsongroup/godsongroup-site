<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODSON GROUP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:url('bg.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.85);
min-height:100vh;
padding-bottom:50px;
}

header{
padding:50px 20px;
animation:fade 2s ease;
}

header h1{
font-size:55px;
color:#d4af37;
text-shadow:0 0 20px gold;
margin-bottom:15px;
}

header p{
font-size:22px;
color:#ddd;
}

.section-title{
font-size:45px;
color:#d4af37;
margin:40px 0 25px;
text-shadow:0 0 10px gold;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
height:240px;
object-fit:cover;
border-radius:25px;
border:3px solid #d4af37;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 25px gold;
}

.video-box{
padding:20px;
}

.video-box video{
width:95%;
border-radius:25px;
border:3px solid #d4af37;
}

.socials{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.socials a{
text-decoration:none;
padding:18px;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:white;
transition:0.3s;
}

.socials a:hover{
transform:scale(1.05);
}

.call{
background:#8b6b2e;
}

.whatsapp{
background:#25D366;
}

.viber{
background:#7360f2;
}

.telegram{
background:#229ED9;
}

.instagram{
background:#E1306C;
}

.facebook{
background:#1877F2;
}

.tiktok{
background:black;
}

.floating{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
text-decoration:none;
box-shadow:0 0 20px #25D366;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(-40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

footer{
margin-top:40px;
padding:20px;
font-size:18px;
color:#bbb;
}

</style>
</head>
